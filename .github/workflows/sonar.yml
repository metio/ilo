name: SonarQube Cloud
# Main-branch analysis only: it establishes the new-code baseline. Pull-request analysis runs inside
# verify.yml, reusing that job's test run so the PR scan is not a second full build.
on:
  push:
    branches: [ main ]
# Cancel superseded analyses on the same branch; a newer push makes an in-flight Sonar run obsolete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
# Analysis only reads the checkout; Sonar auth is via SONAR_TOKEN, not the GITHUB_TOKEN.
permissions:
  contents: read
jobs:
  sonar:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - id: checkout
        name: Clone Git Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # Sonar needs full history to assign blame and compute the new-code period.
          fetch-depth: 0
      - id: graal
        name: Set up GraalVM
        uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f # v1
        with:
          distribution: graalvm-community
          java-version: 25
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - id: cache
        name: Cache Maven Repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository
          key: maven-${{ github.job }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ github.job }}-
            maven-
      - id: analyze
        name: Build and Analyze
        # 'verify' produces the coverage execution data and 'jacoco:report' the XML the scanner
        # imports; the native build stays skipped (its default). Project key, organization and the
        # issue exclusions come from the pom.
        run: mvn --batch-mode verify org.jacoco:jacoco-maven-plugin:report sonar:sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
