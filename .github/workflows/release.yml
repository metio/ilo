name: Automated Release
on:
  schedule:
    - cron:  45 3 * * MON
  workflow_dispatch:
# Default to read-only; only the release job below is granted contents: write to publish the release.
permissions:
  contents: read
jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      commit_count: ${{ steps.commits.outputs.count }}
      release_version: ${{ steps.release.outputs.version }}
      previous_version: ${{ steps.last_release.outputs.tag }}
      release_url: ${{ steps.create_release.outputs.upload_url }}
      build_timestamp: ${{ steps.timestamp.outputs.iso8601 }}
    steps:
      - id: checkout
        name: Clone Git Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: last_release
        name: Fetch last release info
        # Capture into a variable on its own line so a failing 'gh' aborts the step instead of writing
        # an empty tag (which would silently corrupt the commit count and version gating below).
        run: |
          set -euo pipefail
          tag=$(gh release view --json tagName --jq '.tagName')
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - id: commits
        name: Count Commits
        env:
          PREVIOUS_TAG: ${{ steps.last_release.outputs.tag }}
        run: |
          set -euo pipefail
          count=$(git rev-list --count "${PREVIOUS_TAG}..HEAD" -- src/main/java pom.xml)
          echo "count=$count" >> "$GITHUB_OUTPUT"
      - id: release
        name: Create Release Version
        if: steps.commits.outputs.count > 0
        run: |
          set -euo pipefail
          version=$(date +'%Y.%-m.%-d')
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Build Timestamp
        id: timestamp
        run: |
          set -euo pipefail
          iso8601=$(date --utc --iso-8601=seconds)
          echo "iso8601=$iso8601" >> "$GITHUB_OUTPUT"
  build:
    name: Build on ${{ matrix.os }}
    needs: prepare
    # Gate the whole job so no runner is provisioned on weeks without qualifying commits, and a future
    # step added without its own guard cannot run unconditionally.
    if: needs.prepare.outputs.commit_count > 0
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - id: checkout
        name: Clone Git Repository
        uses: actions/checkout@v6
      - id: graal
        name: GraalVM Setup
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: 25
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - id: cache
        name: Cache Maven Repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-${{ github.job }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ github.job }}-
            maven-
      - id: gpg
        name: GPG Key
        uses: timheuer/base64-to-file@v2.0
        with:
          fileName: signing.key.asc
          fileDir: ${{ github.workspace}}
          encodedString: ${{ secrets.GPG_SECRET_KEY_BASE64 }}
      - id: verify
        name: Verify Project
        # The signing passphrase goes through SIGN_KEY_PASS (which the sign plugin reads with priority)
        # rather than a -D property, so it is not exposed in the runner's process table.
        env:
          SIGN_KEY_PASS: ${{ secrets.GPG_SECRET_KEY_PASSWORD }}
        run: >
          mvn
          --batch-mode
          --activate-profiles release
          --define revision=${{ needs.prepare.outputs.release_version }}
          --define skipNativeBuild=false
          --define sign.keyFile=signing.key.asc
          --define project.build.outputTimestamp=${{ needs.prepare.outputs.build_timestamp }}
          verify
      - id: smoke
        name: Smoke test the native binary
        shell: bash
        # Run the freshly built binary so a native-only failure (a missing reflection/resource
        # registration) fails the release here instead of shipping a binary that crashes on first run.
        run: |
          bin="target/ilo"; [ -f "target/ilo.exe" ] && bin="target/ilo.exe"
          "$bin" --version
          "$bin" --help
      - id: upload-java
        name: Upload JVM Artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: jvm
          path: ./target/ilo-*-jvm*
      - id: upload-linux
        name: Upload Linux Artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v6
        with:
          name: linux
          path: ./target/ilo-*-linux*
      - id: upload-mac
        name: Upload Mac Artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v6
        with:
          name: mac
          path: ./target/ilo-*-mac*
      - id: upload-windows
        name: Upload Windows Artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v6
        with:
          name: windows
          path: ./target/ilo-*-windows*
  release:
    name: GitHub Release
    needs: [prepare, build]
    if: needs.prepare.outputs.commit_count > 0
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - id: checkout
        name: Clone Git Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: download
        name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
      - id: create_release
        name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.release_version }}
          name: ${{ needs.prepare.outputs.release_version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          generate_release_notes: true
          # Fail the release if any expected asset is missing rather than publishing an incomplete set;
          # the upload steps use globs, so a filename diverging from release_version would otherwise pass.
          fail_on_unmatched_files: true
          files: |
            artifacts/jvm/ilo-${{ needs.prepare.outputs.release_version }}-jvm.tar.gz
            artifacts/jvm/ilo-${{ needs.prepare.outputs.release_version }}-jvm.tar.gz.asc
            artifacts/jvm/ilo-${{ needs.prepare.outputs.release_version }}-jvm.tar.gz.sha512
            artifacts/linux/ilo-${{ needs.prepare.outputs.release_version }}-linux.tar.gz
            artifacts/linux/ilo-${{ needs.prepare.outputs.release_version }}-linux.tar.gz.asc
            artifacts/linux/ilo-${{ needs.prepare.outputs.release_version }}-linux.tar.gz.sha512
            artifacts/mac/ilo-${{ needs.prepare.outputs.release_version }}-mac.tar.gz
            artifacts/mac/ilo-${{ needs.prepare.outputs.release_version }}-mac.tar.gz.asc
            artifacts/mac/ilo-${{ needs.prepare.outputs.release_version }}-mac.tar.gz.sha512
            artifacts/windows/ilo-${{ needs.prepare.outputs.release_version }}-windows.tar.gz
            artifacts/windows/ilo-${{ needs.prepare.outputs.release_version }}-windows.tar.gz.asc
            artifacts/windows/ilo-${{ needs.prepare.outputs.release_version }}-windows.tar.gz.sha512
