name: Warm Caches
on:
  push:
    branches: [ main ]
permissions:
  contents: read
jobs:
  warm-maven:
    name: Warm Maven cache
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - id: checkout
        name: Clone Git Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - id: graal
        name: Set up GraalVM
        uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f # v1
        with:
          distribution: graalvm-community
          java-version: 25
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - id: cache
        name: Cache Maven Repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.m2/repository
          key: maven-${{ github.job }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ github.job }}-
            maven-
      - id: resolve
        name: Resolve dependencies
        # Runs on the default branch only, so its cache is readable by every PR. The Maven repository is
        # OS-independent (pure-Java jars), so this single run seeds the shared base cache that each PR job
        # — on any OS — restores through the "maven-" restore-key prefix, fetching only its job-specific
        # delta. The integration profile is included so its extra dependencies are part of the base.
        run: mvn --batch-mode -Pintegration dependency:go-offline
