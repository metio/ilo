# Issue exclusions for rules whose findings are deliberate design choices, contract
# requirements, or analyzer false positives in this codebase. Each entry documents why
# the rule does not apply here. Rules not listed remain fully active.

sonar.issue.ignore.multicriteria=logger,generics,debugfield,methodsource,publicfields,testinfra1,testinfra2,prose1,prose2,nestedtry,sleep,versionname,versionctor

# S106 — ilo is a single-binary native-image CLI with no logging framework; stderr/stdout
# is the user-facing output channel by design, so a logger is neither present nor wanted.
sonar.issue.ignore.multicriteria.logger.ruleKey=java:S106
sonar.issue.ignore.multicriteria.logger.resourceKey=**/*

# S119 — the model layer uses descriptive type-parameter names (OPTIONS, RUNTIME, …) as a
# documented convention; single-letter names would obscure the generic abstraction.
sonar.issue.ignore.multicriteria.generics.ruleKey=java:S119
sonar.issue.ignore.multicriteria.generics.resourceKey=**/*

# S1845 — the Options interface contract is debug(); the field it returns is named debug.
# Renaming the field would break the picocli @Option binding and the interface method.
sonar.issue.ignore.multicriteria.debugfield.ruleKey=java:S1845
sonar.issue.ignore.multicriteria.debugfield.resourceKey=**/*Options.java

# S1144 — these private methods are JUnit @MethodSource providers referenced by string
# name from subclasses, so they are used despite appearing unreferenced.
sonar.issue.ignore.multicriteria.methodsource.ruleKey=java:S1144
sonar.issue.ignore.multicriteria.methodsource.resourceKey=**/TestMethodSources.java

# S1104 — these fields are public to match the picocli option-binding style of the class
# and are resolved programmatically before the container is created.
sonar.issue.ignore.multicriteria.publicfields.ruleKey=java:S1104
sonar.issue.ignore.multicriteria.publicfields.resourceKey=**/ShellOptions.java

# S2187 — test-support classes (ArchUnit suite runner, reflection assertion helper) that
# carry no @Test of their own.
sonar.issue.ignore.multicriteria.testinfra1.ruleKey=java:S2187
sonar.issue.ignore.multicriteria.testinfra1.resourceKey=**/ArchUnitTests.java
sonar.issue.ignore.multicriteria.testinfra2.ruleKey=java:S2187
sonar.issue.ignore.multicriteria.testinfra2.resourceKey=**/ClassTests.java

# S125 — flagged as commented-out code, but these are prose comments that merely contain
# code-like tokens (a field name, a quoted flag); they explain current intent.
sonar.issue.ignore.multicriteria.prose1.ruleKey=java:S125
sonar.issue.ignore.multicriteria.prose1.resourceKey=**/RemoteUserMapping.java
sonar.issue.ignore.multicriteria.prose2.ruleKey=java:S125
sonar.issue.ignore.multicriteria.prose2.resourceKey=**/DockerTest.java

# S1141 — the nested try performs atomic temp-file cleanup-on-failure and reads clearly
# inline; extracting it would scatter the write-then-move invariant.
sonar.issue.ignore.multicriteria.nestedtry.ruleKey=java:S1141
sonar.issue.ignore.multicriteria.nestedtry.resourceKey=**/RcTrust.java

# S2925 — this test exercises the capture drain-grace timing, so the sleep is the behavior
# under test rather than an incidental delay.
sonar.issue.ignore.multicriteria.sleep.ruleKey=java:S2925
sonar.issue.ignore.multicriteria.sleep.resourceKey=**/ExecutablesTest.java

# S1700 — VERSION is a conventional name for the single version constant this class holds.
sonar.issue.ignore.multicriteria.versionname.ruleKey=java:S1700
sonar.issue.ignore.multicriteria.versionname.resourceKey=**/version/Version.java

# S1118 — a private constructor would make the class uncoverable: the VERSION constant
# inlines at compile time, so only an instantiable constructor lets JaCoCo count the class
# and satisfy the CLASS MISSEDCOUNT = 0 coverage gate.
sonar.issue.ignore.multicriteria.versionctor.ruleKey=java:S1118
sonar.issue.ignore.multicriteria.versionctor.resourceKey=**/version/Version.java
