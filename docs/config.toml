baseURL = "https://ilo.projects.metio.wtf/"
locale = "en"
theme = "metio"
title = "ilo"

pygmentsUseClasses = true
sectionPagesMenu = "main"
enableRobotsTXT = true
defaultContentLanguage = "en"
enableInlineShortcodes = true

[outputs]
  home = [ "HTML", "RSS", "ATOM", "HUMANS", "FOAF", "LLMS"]
  section = ["HTML", "RSS", "ATOM"]
  term = ["HTML", "RSS", "ATOM"]

# Generates /llms-full.txt — the documentation concatenated for LLMs. The text/plain media type is
# defined by the theme (it also backs humans.txt). The curated index lives at static/llms.txt.
[outputFormats.LLMS]
  name = "LLMS"
  mediaType = "text/plain"
  baseName = "llms-full"
  isPlainText = true
  isHTML = false
  noUgly = true
  permalinkable = false
  notAlternative = true

[params]
  mainSections = ["community", "contributors", "integration", "metrics", "shell", "usage"]
  author = "metio.wtf"
  email = "https://metio.groups.io/g/main/topics"
  matrix = "#talk.metio:matrix.org"
  github = "metio/ilo"
  work = "ilo.projects.metio.wtf"
  description = "manage reproducible build environments"

[security.funcs]
  getenv = ['^HUGO_', '^ILO_']
